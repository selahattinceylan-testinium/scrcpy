name: Auto Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # Read the version from meson.build
          BASE_VERSION=$(grep -oP "version:\s*'\K[^']+" meson.build || true)
          if [[ -z "$BASE_VERSION" ]]; then
            echo "::error::Could not extract version from meson.build"
            exit 1
          fi

          # Validate semver format (MAJOR.MINOR.PATCH)
          if ! [[ "$BASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$BASE_VERSION' does not match expected MAJOR.MINOR.PATCH format"
            exit 1
          fi

          echo "Base version from meson.build: $BASE_VERSION"

          # Check if a tag for this version already exists and find the next
          # available version by incrementing the patch number
          VERSION="$BASE_VERSION"
          MAX_ATTEMPTS=100
          ATTEMPTS=0
          while git rev-parse "v${VERSION}" >/dev/null 2>&1; do
            ATTEMPTS=$((ATTEMPTS + 1))
            if [[ $ATTEMPTS -ge $MAX_ATTEMPTS ]]; then
              echo "::error::Exceeded $MAX_ATTEMPTS version increment attempts"
              exit 1
            fi
            echo "Tag v${VERSION} already exists, incrementing patch..."
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
            PATCH=$((PATCH + 1))
            VERSION="${MAJOR}.${MINOR}.${PATCH}"
          done

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Selected version: ${VERSION} (tag: v${VERSION})"

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "scrcpy ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          draft: false
          prerelease: false
